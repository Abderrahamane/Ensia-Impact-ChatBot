name: quality-gate

on:
  push:
  pull_request:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build structured tables
        run: |
          python pipeline/build_structured_tables.py || true
      - name: Run quality pipeline
        run: |
          python ops/run_quality_gate.py

