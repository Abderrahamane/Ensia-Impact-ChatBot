services:
  - type: web
    name: ensia-impact-web
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT

  - type: worker
    name: ensia-impact-bot
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/telegram_bot.py
    envVars:
      - key: ENSIA_GENERATION_BACKEND
        value: extractive
      - key: ENSIA_RAG_TOP_K
        value: "5"
      - key: ENSIA_BOT_COOLDOWN_SECONDS
        value: "3"
      - key: ENSIA_BOT_RATE_LIMIT_PER_MINUTE
        value: "8"

